stages:
  - validate
  - security
  - lint
  - test
  - build
  - smoke
  - package
  - deploy-staging
  - verify-staging
  - deploy-prod
  - verify-prod
  - rollback

variables:
  STAGING_DIR: /var/www/portfolio-staging
  PROD_DIR: /var/www/portfolio
  STAGING_URL: "https://staging.muazbhutta.online"
  PROD_URL: "https://muazbhutta.online"

default:
  before_script:
    - set -o pipefail
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]

validate:repo:
  stage: validate
  script:
    - node --version
    - test -f index.html
    - node -e "JSON.parse(require('fs').readFileSync('package.json'))"
    - echo "Repo OK"

security:secret-scan:
  stage: security
  needs: []
  script:
    - mkdir -p reports
    - bash ci/secret-scan.sh | tee reports/secret-scan.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

lint:html:
  stage: lint
  needs: ["validate:repo"]
  script:
    - npm ci --prefer-offline || npm install
    - mkdir -p reports
    - npm run lint:html 2>&1 | tee reports/lint-html.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

lint:css:
  stage: lint
  needs: ["validate:repo"]
  script:
    - npm ci --prefer-offline || npm install
    - mkdir -p reports
    - npm run lint:css 2>&1 | tee reports/lint-css.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

lint:js:
  stage: lint
  needs: ["validate:repo"]
  script:
    - npm ci --prefer-offline || npm install
    - mkdir -p reports
    - npm run lint:js 2>&1 | tee reports/lint-js.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

test:html-validate:
  stage: test
  needs: ["lint:html", "lint:css", "lint:js"]
  script:
    - npm ci --prefer-offline || npm install
    - mkdir -p reports
    - npm run validate:html 2>&1 | tee reports/html-validate.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

build:site:
  stage: build
  needs: ["test:html-validate", "security:secret-scan"]
  script:
    - npm ci --prefer-offline || npm install
    - npm run build
    - cat dist/build-info.json
  artifacts:
    paths: [dist/]
    expire_in: 1 week

smoke:dist:
  stage: smoke
  needs: ["build:site"]
  script:
    - npm ci --prefer-offline || npm install
    - mkdir -p reports
    - npm run test:smoke | tee reports/smoke.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week

package:release:
  stage: package
  needs: ["smoke:dist", "build:site"]
  script:
    - VERSION=$(node -p "require('./dist/build-info.json').version")
    - tar -czf "portfolio-${VERSION}.tar.gz" -C dist .
    - ls -lh portfolio-*.tar.gz
  artifacts:
    paths: ["portfolio-*.tar.gz", dist/]
    expire_in: 4 weeks

deploy:staging:
  stage: deploy-staging
  needs: ["package:release"]
  environment:
    name: staging
    url: $STAGING_URL
  script:
    - mkdir -p "$STAGING_DIR"
    - rsync -a --delete dist/ "$STAGING_DIR"/
    - echo "Deployed to staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

verify:staging:
  stage: verify-staging
  needs: ["deploy:staging"]
  script:
    - mkdir -p reports
    - curl -fsS "$STAGING_URL" -o /dev/null && echo "Staging OK"
    - curl -fsS "$STAGING_URL/build-info.json" | tee reports/staging-verify.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:production:
  stage: deploy-prod
  needs: ["verify:staging"]
  environment:
    name: production
    url: $PROD_URL
  when: manual
  script:
    - mkdir -p "$PROD_DIR"
    - rsync -a --delete "$PROD_DIR"/ "${PROD_DIR}.previous"/ || true
    - rsync -a --delete dist/ "$PROD_DIR"/
    - echo "Deployed to production"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

verify:production:
  stage: verify-prod
  needs: ["deploy:production"]
  script:
    - mkdir -p reports
    - curl -fsS "$PROD_URL" -o /dev/null && echo "Production OK"
    - curl -fsS "$PROD_URL/build-info.json" | tee reports/prod-verify.txt
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

rollback:production:
  stage: rollback
  needs: ["deploy:production"]
  when: manual
  script:
    - test -d "${PROD_DIR}.previous" || (echo "No previous release" && exit 1)
    - rsync -a --delete "${PROD_DIR}.previous"/ "$PROD_DIR"/
    - echo "ROLLED BACK"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
